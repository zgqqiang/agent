name: Docker Build

on:
  workflow_dispatch:
    inputs:
      branch_or_tag:
        description: '选择要构建的分支或tag'
        required: true
        default: 'main'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.branch_or_tag }}
    
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Generate timestamp
      id: time
      run: echo "tag=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_OUTPUT
    
    - name: Build and push multi-arch
      uses: docker/build-push-action@v5
      with:
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/agent:${{ steps.time.outputs.tag }}
        platforms: linux/amd64,linux/arm64

    - name: Install skopeo
      run: |
        sudo apt-get update
        sudo apt-get install -y skopeo
    
    - name: Save multi-arch image to tar
      run: |
        mkdir -p artifacts
        skopeo copy \
          --multi-arch all \
          docker://${{ secrets.DOCKER_USERNAME }}/agent:${{ steps.time.outputs.tag }} \
          oci-archive:artifacts/agent-${{ steps.time.outputs.tag }}.tar:${{ secrets.DOCKER_USERNAME }}/agent:${{ steps.time.outputs.tag }}
    
    - name: Upload tar artifact
      uses: actions/upload-artifact@v4
      with:
        name: agent-${{ steps.time.outputs.tag }}
        path: artifacts/agent-${{ steps.time.outputs.tag }}.tar
        retention-days: 30
